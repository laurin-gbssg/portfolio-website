<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kontakt – Schreib Laurin Polla eine Nachricht">
  <title>Laurin Polla – Kontakt</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo" aria-label="Startseite">
      <img src="assets/img/logo.webp" alt="Laurin Polla Logo" width="612" height="408">
    </a>
    <nav class="nav" aria-label="Hauptnavigation">
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-list" aria-label="Menü öffnen">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-list" id="nav-list">
        <li><a href="index.html"         class="nav-link">Startseite</a></li>
        <li><a href="faehigkeiten.html"  class="nav-link">Fähigkeiten</a></li>
        <li><a href="portfolio.html"     class="nav-link">Portfolio</a></li>
        <li><a href="kontakt.html"       class="nav-link active">Kontakt</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <div class="section-title">
      <h1>Kontaktformular</h1>
      <p>Ich freue mich auf deine Nachricht</p>
    </div>

    <div class="contact-layout">

      <div class="contact-deco-circle" aria-hidden="true">
        <img src="assets/img/profil.webp" alt="" width="800" height="800" loading="lazy">
      </div>

      <section aria-labelledby="formular-titel">
        <h2 id="formular-titel" class="visually-hidden">Kontaktformular</h2>

        <form class="contact-form" action="#" method="post" novalidate>

          <div class="form-group">
            <label for="email">E-Mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="deine@email.ch"
              required
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label for="nachricht">Nachricht</label>
            <textarea
              id="nachricht"
              name="nachricht"
              placeholder="Deine Nachricht …"
              required
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Senden</button>

        </form>

        <address class="contact-info">
          <p>
            <a href="mailto:laurin.polla@gmail.com">E-Mail</a>
            &middot;
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            &middot;
            <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
          </p>
          <p>
            <a href="tel:+41792425878">Tel. +41 79 242 58 78</a>
          </p>
        </address>

      </section>

    </div>

  </main>

  <footer class="site-footer">
    <hr class="footer-line">
    <p>© 2026 Laurin Polla &middot; <a href="#">Impressum</a> &middot; <a href="#">Datenschutz</a></p>
  </footer>

  <script src="js/nav.js"></script>
</body>
</html>
